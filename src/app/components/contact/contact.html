<section id="contact">
  <div class="wrap">
    <div class="contact-layout">
      <div class="contact-big-text reveal">
        <div class="avail-pill">
          <div class="avail-dot"></div>Disponible ahora
        </div>
        <h2 class="contact-headline">¿Tienes un<br> <em>proyecto?</em></h2>
        <p class="contact-sub">
          Estoy abierta a oportunidades de <strong>tiempo completo</strong>, freelance, remoto,
          híbrido o presencial. Si tienes una vacante o proyecto interesante, hablemos.
        </p>
        <a href="mailto:melissacorralzarate@gmail.com" class="btn-fill">Enviar Email →</a>
      </div>

      <div class="contact-links-panel reveal d1">
        <a [href]="link.href" class="clink" *ngFor="let link of links"
          [attr.target]="link.href.startsWith('http') ? '_blank' : null">
          <span class="clink-icon">
            <!-- Mail -->
            <svg *ngIf="link.icon === 'mail'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <!-- GitHub -->
            <svg *ngIf="link.icon === 'github'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.4 5.4 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
            <!-- LinkedIn -->
            <svg *ngIf="link.icon === 'linkedin'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
            <!-- Phone -->
            <svg *ngIf="link.icon === 'phone'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.39 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </span>
          <div>
            <div class="clink-label">{{ link.label }}</div>
            <div class="clink-val">{{ link.val }}</div>
          </div>
        </a>
      </div>
    </div>
  </div>
</section>
